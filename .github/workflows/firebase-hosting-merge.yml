name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build demo
        run: cd demo && npm i && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SVELTE_TOGGLE_SWITCH }}

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools@latest deploy --only hosting --project svelte-toggle-switch --non-interactive 2>&1 | tee /tmp/firebase.log || {
            grep -q "current active version" /tmp/firebase.log && echo "Live channel already up to date" || { cat /tmp/firebase.log; exit 1; }
          }
