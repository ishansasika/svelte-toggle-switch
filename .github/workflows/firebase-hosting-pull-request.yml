name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build demo
        run: cd demo && npm i && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SVELTE_TOGGLE_SWITCH }}

      - name: Deploy Preview to Firebase Hosting
        run: npx firebase-tools@latest hosting:channel:deploy pr-${{ github.event.number }} --project svelte-toggle-switch --expires 7d --non-interactive
