name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build demo
        run: cd demo && npm i && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SVELTE_TOGGLE_SWITCH }}

      - name: Deploy Preview to Firebase Hosting
        id: deploy
        run: |
          npx firebase-tools@latest hosting:channel:deploy pr-${{ github.event.number }} \
            --project svelte-toggle-switch \
            --expires 7d \
            --non-interactive 2>&1 | tee /tmp/firebase.log || {
            if grep -q "current active version" /tmp/firebase.log; then
              echo "Content matches live channel — preview is already up to date"
            else
              cat /tmp/firebase.log
              exit 1
            fi
          }
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.web\.app' /tmp/firebase.log | head -1)
          if [ -z "$URL" ]; then
            URL="https://svelte-toggle-switch--pr-${{ github.event.number }}.web.app"
          fi
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔥 Firebase preview deployed: ${process.env.PREVIEW_URL}`
            })
